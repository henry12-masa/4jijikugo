<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>四字熟語クイズ</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: 160px 1fr 160px;
      gap: 20px;
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 10px;
    }

    .ad {
      background: white;
      border: 2px dashed #bbb;
      border-radius: 12px;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }

    main {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      text-align: center;
    }

    select, button {
      font-size: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 8px;
      cursor: pointer;
    }

    button {
      background: #222;
      color: white;
      border: none;
    }

    button:hover {
      opacity: .85;
    }

    .question {
      font-size: 24px;
      font-weight: bold;
      margin: 25px 0;
      line-height: 1.6;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .choice {
      background: #f0f0f0;
      color: #222;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 17px;
    }

    .choice.correct {
      background: #2ecc71;
      color: white;
    }

    .choice.wrong {
      background: #e74c3c;
      color: white;
    }

    .status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .ad {
        min-height: 90px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>四字熟語クイズ</h1>
  <p>200問から30問を選んで挑戦！</p>
</header>

<div class="layout">
  <aside class="ad"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>

<ins class="adsbygoogle"

  <main>
    <div id="startArea">
      <h2>出題数を選択</h2>
      <select id="questionCount">
        <option value="10">10問</option>
        <option value="20">20問</option>
        <option value="30" selected>30問</option>
      </select>
      <br>
      <button onclick="startQuiz()">スタート</button>
    </div>

    <div id="quizArea" class="hidden">
      <div id="progress"></div>
      <div class="question" id="question"></div>
      <div class="choices" id="choices"></div>
      <div class="status" id="status"></div>
    </div>

    <div id="resultArea" class="hidden">
      <h2>結果発表</h2>
      <p id="resultText"></p>
      <button onclick="location.reload()">もう一度遊ぶ</button>
    </div>
  </main>

  <aside class="ad"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"

</div>

let questions = [];
let current = 0;
let score = 0;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  const count = Number(document.getElementById("questionCount").value);
  questions = shuffle([...quizData]).slice(0, count);

  current = 0;
  score = 0;

  document.getElementById("startArea").classList.add("hidden");
  document.getElementById("quizArea").classList.remove("hidden");

  showQuestion();
}

function showQuestion() {
  const q = questions[current];

  document.getElementById("progress").textContent =
    `${current + 1} / ${questions.length} 問目　正解数：${score}`;

  document.getElementById("question").textContent = q.q;
  document.getElementById("status").textContent = "";

  const choicesBox = document.getElementById("choices");
  choicesBox.innerHTML = "";

  const choices = q.c.map((text, index) => ({
    text,
    originalIndex: index
  }));

  shuffle(choices).forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice.text;
    btn.onclick = () => answer(btn, choice.originalIndex);
    choicesBox.appendChild(btn);
  });
}

function answer(button, selectedIndex) {
  const q = questions[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => btn.disabled = true);

  if (selectedIndex === q.a) {
    button.classList.add("correct");
    document.getElementById("status").textContent = "正解！";
    score++;
  } else {
    button.classList.add("wrong");
    document.getElementById("status").textContent =
      `不正解。正解は「${q.c[q.a]}」`;

    buttons.forEach(btn => {
      if (btn.textContent === q.c[q.a]) {
        btn.classList.add("correct");
      }
    });
  }

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 1200);
}

function showResult() {
  document.getElementById("quizArea").classList.add("hidden");
  document.getElementById("resultArea").classList.remove("hidden");

  const percent = Math.round(score / questions.length * 100);

  document.getElementById("resultText").innerHTML =
    `${questions.length}問中 ${score}問正解！<br>正答率：${percent}%`;
}
</script>
